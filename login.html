<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Login — App-xdev</title>
  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #f2f2f2;
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* Logo / brand */
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand-emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; }
    .brand-name {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Card */
    .card {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    h1 {
      font-family: 'Inter', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      color: #f2f2f2;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.875rem;
      margin-bottom: 28px;
    }

    /* Google Button */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px 16px;
      background: #fff;
      color: #3c4043;
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 0.9375rem;
      border: 1px solid #dadce0;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      text-decoration: none;
      margin-bottom: 20px;
    }
    .btn-google:hover {
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .btn-google:active { background: #f1f3f4; }

    .google-logo {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .divider-line { flex: 1; height: 1px; background: #2d2d2d; }
    .divider-text { color: #555; font-size: 0.75rem; white-space: nowrap; }

    /* Form */
    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 6px;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      pointer-events: none;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px 10px 38px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f2f2f2;
      font-family: 'Roboto', sans-serif;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
    }

    /* Error */
    .error-box {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      font-size: 0.8125rem;
      padding: 10px 14px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 14px;
      display: none;
    }

    /* Submit */
    .btn-login {
      display: block;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.9375rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      margin-top: 4px;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    /* Footer links */
    .card-footer {
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .card-footer a {
      color: #555;
      font-size: 0.8125rem;
      text-decoration: none;
      transition: color 0.15s;
    }
    .card-footer a:hover { color: #10b981; }

    /* Bottom link */
    .back-wrap {
      margin-top: 20px;
      text-align: center;
    }
    .back-link {
      color: #555;
      font-size: 0.8125rem;
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: #f2f2f2; }

    /* Google icon inline SVG colors */
  </style>
</head>
<body>

  <!-- Brand -->
  <div class="brand">
    <span class="brand-emoji">🏎️💨🔥</span>
    <span class="brand-name">App-xdev - Dapurngebul</span>
  </div>

  <!-- Card -->
  <div class="card">
    <h1>🔐 Member Login</h1>
    <p class="subtitle">Masuk untuk akses area download eksklusif</p>

    <!-- Google Sign-In Button -->
    <button class="btn-google" onclick="handleGoogleLogin()">
      <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Masuk dengan Google
    </button>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">atau masuk dengan akun member</span>
      <div class="divider-line"></div>
    </div>

    <!-- Error -->
    <div class="error-box" id="error-box"></div>

    <!-- Form -->
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="username" placeholder="Masukkan username" maxlength="50" autocomplete="username" />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Masukkan password" maxlength="50" autocomplete="current-password" />
        </div>
      </div>
      <button type="submit" class="btn-login">Masuk Sekarang</button>
    </form>

    <div class="card-footer">
      <a href="#">Lupa password?</a>
      <a href="#">Hubungi Admin</a>
    </div>
  </div>

  <div class="back-wrap">
    <a href="index.html" class="back-link">← Kembali ke Beranda</a>
  </div>

  <script>
    // Manual login
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var u = document.getElementById('username').value.trim();
      var p = document.getElementById('password').value;
      var err = document.getElementById('error-box');

      if (!u || !p) {
        err.style.display = 'block';
        err.textContent = 'Username dan password wajib diisi!';
        return;
      }
      if (u === 'member' && p === 'login') {
        sessionStorage.setItem('member_auth', 'true');
        sessionStorage.setItem('member_name', 'Member');
        window.location.href = 'downloads.html';
      } else {
        err.style.display = 'block';
        err.textContent = 'Username atau password salah!';
      }
    });

    // Google login (UI demo — hubungkan Client ID untuk live)
    function handleGoogleLogin() {
      // Simulasi loading
      var btn = document.querySelector('.btn-google');
      btn.style.opacity = '0.7';
      btn.textContent = 'Menghubungkan ke Google...';
      setTimeout(function() {
        // Untuk implementasi nyata, tambahkan Google Client ID
        // dan gunakan Google Identity Services
        sessionStorage.setItem('member_auth', 'true');
        sessionStorage.setItem('member_name', 'Google User');
        window.location.href = 'downloads.html';
      }, 1200);
    }
  </script>
</body>
</html>
