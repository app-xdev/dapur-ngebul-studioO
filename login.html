<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Login — App-xdev</title>
  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d; color: #f2f2f2;
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 32px;
      width: 100%; max-width: 448px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .icon-wrap {
      width: 64px; height: 64px;
      background: rgba(99,102,241,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 2rem;
    }
    h1 {
      font-family: 'Inter', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      text-align: center; color: #f2f2f2; margin-bottom: 6px;
    }
    .sub { text-align: center; color: #888; font-size: 0.875rem; margin-bottom: 24px; }

    .error-box {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      font-size: 0.875rem;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.875rem; color: #f2f2f2; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 1rem; }
    input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      background: #0d0d0d;
      border: 1px solid #3d3d3d;
      border-radius: 8px;
      color: #f2f2f2;
      font-family: 'Roboto', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }

    .btn-login {
      display: block; width: 100%;
      background: #10b981;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: 1rem;
      padding: 12px;
      border: none; border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.9; }

    .back-link {
      display: block; text-align: center;
      margin-top: 16px;
      color: #888; font-size: 0.875rem;
      text-decoration: none;
    }
    .back-link:hover { color: #f2f2f2; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">🔐</div>
    <h1>Member Login</h1>
    <p class="sub">Masukkan kredensial untuk akses download</p>

    <div class="error-box" id="error-box">Username atau password salah!</div>

    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="username" placeholder="Username" maxlength="50" autocomplete="username" />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Password" maxlength="50" autocomplete="current-password" />
        </div>
      </div>
      <button type="submit" class="btn-login">Login</button>
    </form>

    <a href="index.html" class="back-link">← Kembali ke Beranda</a>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var u = document.getElementById('username').value;
      var p = document.getElementById('password').value;
      if (u === 'member' && p === 'login') {
        sessionStorage.setItem('member_auth', 'true');
        window.location.href = 'downloads.html';
      } else {
        var err = document.getElementById('error-box');
        err.style.display = 'block';
        err.textContent = 'Username atau password salah!';
      }
    });
  </script>
</body>
</html>
